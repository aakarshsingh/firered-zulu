<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aakarsh's FireRed Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--fire-red:#e53935;--fire-dark:#b71c1c;--ember:#ff6f00;--amber:#ffab00;--bg-deep:#0a0a0f;--bg-card:#141420;--bg-card-hover:#1c1c2e;--border:#2a2a3a;--text:#e8e6e3;--text-dim:#8a8a9a;--text-muted:#5a5a6a;--green:#4caf50;--blue:#42a5f5;--danger:#ff5252;--ice:#4fc3f7;--psychic:#f06292;--dragon:#7c4dff;--ghost:#7e57c2;--fighting:#d32f2f;--ground:#d4a437;--rock:#a1887f;--flying:#90caf9;--water:#2196f3;--electric:#fdd835;--fire:#ef5350;--grass:#66bb6a;--normal:#bdbdbd;--bug:#9ccc65;--poison:#ab47bc;--steel:#78909c;--dark:#5d4037}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text);font-family:'Chakra Petch',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(229,57,53,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(255,111,0,.05) 0%,transparent 60%);pointer-events:none}
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:16px}
.header{text-align:center;padding:32px 16px 24px;border-bottom:2px solid var(--fire-dark);margin-bottom:24px;position:relative}
.header::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:120px;height:2px;background:var(--ember);box-shadow:0 0 12px var(--ember)}
.header h1{font-family:'Press Start 2P',monospace;font-size:18px;color:var(--fire-red);text-shadow:0 0 20px rgba(229,57,53,.4);letter-spacing:2px;line-height:1.6}
.header .subtitle{font-size:12px;color:var(--text-dim);margin-top:8px;font-family:'Press Start 2P',monospace;letter-spacing:1px}
.badge-row{display:flex;justify-content:center;gap:6px;margin-top:14px;flex-wrap:wrap}
.badge-pip{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px}
.badge-pip.earned{border-color:var(--amber);background:rgba(255,171,0,.15);color:var(--amber)}
.badge-pip.pending{border-color:var(--text-muted);color:var(--text-muted)}
.tabs{display:flex;gap:4px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tab{padding:10px 18px;background:var(--bg-card);border:1px solid var(--border);border-bottom:none;border-radius:6px 6px 0 0;font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:13px;color:var(--text-dim);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text);background:var(--bg-card-hover)}
.tab.active{color:var(--fire-red);background:var(--bg-card-hover);border-color:var(--fire-red)}
.view{display:none;animation:fadeIn .3s ease}.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.pokemon-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.pokemon-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--tc1),var(--tc2))}
.pokemon-card:hover{border-color:var(--fire-red);transform:translateY(-2px);box-shadow:0 8px 24px rgba(229,57,53,.15)}
.pokemon-card.backup{opacity:.7;border-style:dashed}.pokemon-card.backup:hover{opacity:1}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.poke-name{font-family:'Press Start 2P',monospace;font-size:14px}
.poke-level{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--amber)}
.poke-types{display:flex;gap:6px;margin-bottom:12px}
.type-badge{padding:2px 10px;border-radius:3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff;display:inline-block}
.level-bar-container{margin:12px 0 8px}
.level-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-bottom:4px}
.level-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.level-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.moves-compact{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px}
.move-pill{padding:4px 8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:3px;font-size:11px;color:var(--text-dim);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.move-pill.locked{border-left:2px solid var(--green);color:var(--text)}
.move-pill.pending{border-left:2px solid var(--amber);color:var(--amber);font-style:italic}
.backup-tag{position:absolute;top:12px;right:12px;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;font-family:'Press Start 2P',monospace}
.dex-num{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px}
.detail-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);cursor:pointer;font-size:13px;margin-bottom:20px;transition:all .2s}
.detail-back:hover{color:var(--text);border-color:var(--fire-red)}
.detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.detail-name{font-family:'Press Start 2P',monospace;font-size:20px}
.detail-level-edit{display:flex;align-items:center;gap:8px}
.detail-level-edit label{font-size:12px;color:var(--text-dim);font-family:'Press Start 2P',monospace}
.detail-level-edit input{width:60px;padding:6px 8px;background:var(--bg-deep);border:1px solid var(--border);border-radius:4px;color:var(--amber);font-family:'Press Start 2P',monospace;font-size:14px;text-align:center}
.detail-level-edit input:focus{outline:none;border-color:var(--fire-red)}
.detail-level-edit button{padding:6px 14px;background:var(--fire-dark);border:1px solid var(--fire-red);border-radius:4px;color:#fff;font-size:12px;cursor:pointer;font-family:'Chakra Petch',sans-serif;font-weight:600;transition:all .2s}
.detail-level-edit button:hover{background:var(--fire-red)}
.section-title{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--fire-red);margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);letter-spacing:1px}
.moveset-table{width:100%;border-collapse:collapse}
.moveset-table th{text-align:left;font-size:10px;color:var(--text-muted);padding:6px 10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border)}
.moveset-table td{padding:10px;border-bottom:1px solid rgba(42,42,58,.5);font-size:13px}
.moveset-table tr:hover{background:rgba(255,255,255,.02)}
.milestone-list{list-style:none}
.milestone-list li{padding:10px 14px;margin-bottom:6px;background:var(--bg-card);border-left:3px solid var(--border);border-radius:0 4px 4px 0;font-size:13px;display:flex;align-items:center;gap:10px}
.milestone-list li.done{border-left-color:var(--green);color:var(--text-dim);text-decoration:line-through}
.milestone-list li.next{border-left-color:var(--amber);background:rgba(255,171,0,.05)}
.milestone-list li.future{border-left-color:var(--text-muted)}
.battle-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
.battle-card h3{font-family:'Press Start 2P',monospace;font-size:12px;margin-bottom:4px}
.battle-card .trainer-type{font-size:11px;color:var(--text-dim);margin-bottom:12px}
.battle-card .target-level{position:absolute;top:16px;right:16px;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--amber)}
.enemy-team-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px}
.enemy-team-table th{text-align:left;font-size:9px;color:var(--text-muted);padding:4px 8px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border)}
.enemy-team-table td{padding:6px 8px;border-bottom:1px solid rgba(42,42,58,.3);vertical-align:top}
.enemy-team-table .mn{font-weight:700}.enemy-team-table .mm{color:var(--text-dim);font-size:11px}.enemy-team-table .mi{color:var(--amber);font-size:10px;font-style:italic}
.strat-row{display:flex;gap:16px;flex-wrap:wrap}
.strat-item{flex:1;min-width:200px;padding:10px 14px;background:rgba(255,255,255,.02);border-radius:4px;border:1px solid var(--border)}
.strat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.strat-value{font-size:13px;font-weight:600}
.danger-box{margin-top:12px;padding:10px 14px;background:rgba(255,82,82,.06);border:1px solid rgba(255,82,82,.2);border-radius:6px;font-size:12px;line-height:1.6}.danger-box strong{color:var(--danger)}
.tip-box{margin-top:8px;padding:10px 14px;background:rgba(76,175,80,.06);border:1px solid rgba(76,175,80,.2);border-radius:6px;font-size:12px;line-height:1.6}.tip-box strong{color:var(--green)}
.trivia-box{margin-top:8px;padding:10px 14px;background:rgba(66,165,245,.06);border:1px solid rgba(66,165,245,.2);border-radius:6px;font-size:12px;line-height:1.6;color:var(--text-dim)}.trivia-box strong{color:var(--blue)}
.matchup-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.matchup-item{padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:4px}
.matchup-vs{font-size:10px;color:var(--text-muted);text-transform:uppercase}
.matchup-answer{font-size:13px;font-weight:600;color:var(--green);margin-top:2px}
.matchup-warn{font-size:10px;color:var(--danger);margin-top:2px}
.grind-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.grind-card h3{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--ember);margin-bottom:10px}
.grind-card p{font-size:13px;line-height:1.6;color:var(--text-dim)}
.gh{color:var(--text);font-weight:600}
.exp-priority{counter-reset:priority}
.exp-step{display:flex;align-items:flex-start;gap:14px;padding:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
.exp-step::before{counter-increment:priority;content:counter(priority);flex-shrink:0;width:28px;height:28px;background:var(--fire-dark);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--amber)}
.exp-step-content h4{font-size:14px;margin-bottom:4px}
.exp-step-content p{font-size:12px;color:var(--text-dim);line-height:1.5}
.tracker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:12px}
.tracker-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px}
.tracker-card h4{font-family:'Press Start 2P',monospace;font-size:11px;margin-bottom:10px}
.tracker-controls{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tracker-controls button{width:30px;height:30px;background:var(--bg-deep);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tracker-controls button:hover{border-color:var(--fire-red);color:var(--fire-red)}
.tracker-controls .tracker-lvl{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--amber);min-width:40px;text-align:center}
.tracker-next{font-size:11px;color:var(--text-dim);line-height:1.5}.tracker-next strong{color:var(--amber)}
.reset-btn{display:inline-block;margin-top:16px;padding:8px 20px;background:transparent;border:1px solid var(--text-muted);border-radius:4px;color:var(--text-muted);font-size:12px;cursor:pointer;transition:all .2s}
.reset-btn:hover{border-color:var(--fire-red);color:var(--fire-red)}
.collapse-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;width:100%}.collapse-toggle .arrow{transition:transform 0.2s;font-size:14px;color:var(--text-muted)}.collapse-toggle.open .arrow{transform:rotate(90deg)}.collapse-body{display:none}.collapse-body.open{display:block}
.tac-note{padding:14px 18px;background:rgba(255,171,0,.04);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;margin-bottom:10px;font-size:13px;line-height:1.5}.tac-note strong{color:var(--amber)}
.hm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:8px}
.hm-item{padding:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;text-align:center}
.hm-move{font-weight:700;font-size:13px;margin-bottom:4px}.hm-holder{font-size:11px;color:var(--text-dim)}
.mechanics-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.mechanics-card h4{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--ember);margin-bottom:8px}
.mechanics-card p{font-size:12px;color:var(--text-dim);line-height:1.6}
.split-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.split-col{padding:10px;border-radius:4px;font-size:11px}
.split-col.physical{background:rgba(229,57,53,.08);border:1px solid rgba(229,57,53,.2)}
.split-col.special{background:rgba(66,165,245,.08);border:1px solid rgba(66,165,245,.2)}
.split-col h5{font-size:10px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.impact-item{padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;margin-top:8px;font-size:12px;line-height:1.5}.impact-item strong{color:var(--text)}
@media(max-width:600px){.header h1{font-size:13px}.team-grid,.matchup-grid,.split-grid{grid-template-columns:1fr}.strat-row{flex-direction:column}.tab{padding:8px 12px;font-size:11px}}
</style>
</head>
<body>

<script>
const TC={fire:'#ef5350',water:'#2196f3',ice:'#4fc3f7',electric:'#fdd835',grass:'#66bb6a',poison:'#ab47bc',ground:'#d4a437',rock:'#a1887f',psychic:'#f06292',ghost:'#7e57c2',dragon:'#7c4dff',flying:'#90caf9',fighting:'#d32f2f',normal:'#bdbdbd',bug:'#9ccc65',steel:'#78909c',dark:'#5d4037'};
const DEX={Charizard:'#006',Jolteon:'#135',Lapras:'#131',Snorlax:'#143',Nidoking:'#034',Jynx:'#124',Gyarados:'#130',Growlithe:'#058',Ponyta:'#077',Rapidash:'#078',Arcanine:'#059',Rhyhorn:'#111',Dugtrio:'#051',Nidoqueen:'#031',Dewgong:'#087',Cloyster:'#091',Slowbro:'#080',Onix:'#095',Hitmonchan:'#107',Hitmonlee:'#106',Machamp:'#068','Gengar #1':'#094',Golbat:'#042',Haunter:'#093',Arbok:'#024','Gengar #2':'#094',Dragonair:'#148',Aerodactyl:'#142',Dragonite:'#149',Pidgeot:'#018',Alakazam:'#065',Rhydon:'#112',Exeggutor:'#103',Blastoise:'#009'};

const tb=t=>`<span class="type-badge" style="background:${TC[t]||'#888'}">${t}</span>`;
const BASE_TEAM=[
{name:'Charizard',nick:'LPG',dex:'#006',types:['fire','flying'],baseLvl:51,target:70,backup:false,heldItem:{name:'Charcoal',effect:'+20% Fire moves',loc:'Celadon Game Corner (1,000 coins) or wild Magmar (Cinnabar Mansion — Thief)',obtained:false},
currentMoves:[{name:'Flamethrower',type:'fire',locked:true},{name:'Fly',type:'flying',locked:true},{name:'Dragon Claw',type:'dragon',locked:true},{name:'Blast Burn',type:'fire',locked:true}],
finalMoves:[{name:'Flamethrower',type:'fire',slot:'STAB (Sp)'},{name:'Fly',type:'flying',slot:'STAB (Phys)'},{name:'Blast Burn',type:'fire',slot:'150pw Nuke (Sp)'},{name:'Dragon Claw',type:'dragon',slot:'Coverage (Sp)'}],
milestones:[{desc:'Keep Flamethrower',done:true},{desc:'Keep Fly',done:true},{desc:'Lv.44 → Slash (replace Ember)',done:true},{desc:'Blast Burn (Cape Brink tutor) → replace Brick Break',done:true},{desc:'TM02 Dragon Claw (Victory Road) → replace Slash',done:true}],
gen3:'Flamethrower = Special (Sp.Atk 109). Fly = Physical (Atk 84) — serviceable, not stellar. Dragon Claw is SPECIAL in Gen 3 — scales off that juicy 109 Sp.Atk. Blast Burn is 150 power Special nuke with recharge turn — use as a finisher.',battleBerry:{name:'Charcoal (post-game)',why:'Switch from Lum Berry to Charcoal for E4 rematch. Guarantees Flamethrower/Blast Burn OHKOs on rematch targets like Heracross and bulkier Exeggutor.'}},
{name:'Jolteon',nick:'PATCH.EXE',dex:'#135',types:['electric'],baseLvl:54,target:70,backup:false,heldItem:{name:"King's Rock",effect:'10% flinch on every hit',loc:'Sevault Canyon (Seven Island) — item ball',obtained:false},
currentMoves:[{name:'Thunderbolt',type:'electric',locked:true},{name:'Double Kick',type:'fighting',locked:true},{name:'Quick Attack',type:'normal',locked:true},{name:'Thunder Wave',type:'electric',locked:true}],
finalMoves:[{name:'Thunderbolt',type:'electric',slot:'STAB (Sp)'},{name:'Bite',type:'dark',slot:'Dark = Special in Gen 3!'},{name:'Quick Attack',type:'normal',slot:'Priority (Phys)'},{name:'Thunder Wave',type:'electric',slot:'Utility'}],
milestones:[{desc:'Keep Quick Attack',done:true},{desc:'Lv.30 → Double Kick (replace Growl)',done:true},{desc:'Lv.42 → Thunder Wave (replace Sand-Attack)',done:true},{desc:'TM24 Thunderbolt (Game Corner) → replace Thunder',done:true},{desc:'Move Relearner (Two Island) → Bite replace Double Kick',done:false,next:true}],

function saveLvls(){try{const l={};teamState.forEach(p=>l[p.name]=p.baseLvl);sessionStorage.setItem('fr-lvls',JSON.stringify(l));}catch(e){}}
function pct(c,t){return Math.min(100,Math.round(c/t*100))}
function barCol(p){return p>=100?'var(--green)':p>=70?'var(--amber)':p>=40?'var(--ember)':'var(--fire-red)'}
function nextMs(p){const m=p.milestones.find(m=>m.next);if(m)return m.desc;const u=p.milestones.find(m=>!m.done);return u?u.desc:'Build complete!'}
function autoMs(i){const p=teamState[i],l=p.baseLvl;p.milestones.forEach(m=>{const mt=m.desc.match(/Lv\.(\d+)/);if(mt&&parseInt(mt[1])<=l&&!m.desc.includes('TM')&&!m.desc.includes('Move Deleter')&&!m.desc.includes('Gym 8')){m.done=true;m.next=false}});let f=false;p.milestones.forEach(m=>{if(!m.done&&!f){m.next=true;f=true}else if(!m.done)m.next=false})}
function getE4(name){const r=[];BATTLES.forEach(b=>{if(b.sweeper.includes(name))r.push(`<strong style="color:var(--green)">PRIMARY</strong> vs ${b.title}`);else if(b.backup.includes(name))r.push(`<strong style="color:var(--amber)">BACKUP</strong> vs ${b.title}`);if(b.matchups)b.matchups.forEach(m=>{if(m.answer.includes(name))r.push(`<strong style="color:var(--blue)">COUNTER</strong> → Champion's ${m.vs}`)})});return r.length?r.join('<br>'):'<span style="color:var(--text-muted)">General support</span>'}

function renderTeam(){let h='<div class="team-grid">';teamState.forEach((p,i)=>{const pc=pct(p.baseLvl,p.target),bc=barCol(pc);h+=`<div class="pokemon-card ${p.backup?'backup':''}" style="--tc1:${TC[p.types[0]]};--tc2:${TC[p.types[1]||p.types[0]]}" onclick="showDetail(${i})">${p.backup?'<span class="backup-tag">BACKUP</span>':''}<div class="card-top"><span class="poke-name">${p.nick||p.name}</span><span class="poke-level">Lv.${p.baseLvl}</span></div>${p.nick?`<div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">${p.name}</div>`:''}<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="dex-num">${p.dex}</span><div class="poke-types" style="margin-bottom:0">${p.types.map(tb).join('')}</div></div><div class="level-bar-container"><div class="level-bar-label"><span>→ Lv.${p.target}</span><span>${pc}%</span></div><div class="level-bar"><div class="level-bar-fill" style="width:${pc}%;background:${bc}"></div></div></div><div class="moves-compact">${p.currentMoves.map(m=>`<div class="move-pill ${m.locked?'locked':'pending'}">${m.name}</div>`).join('')}</div><div style="margin-top:10px;font-size:11px;color:var(--text-muted)">Next: <span style="color:var(--amber)">${nextMs(p)}</span></div></div>`});h+='</div>';document.getElementById('view-team').innerHTML=h}

'next':'future'}"><span style="font-size:14px;flex-shrink:0">${m.done?'✅':m.next?'🔶':'⬜'}</span>${m.desc}</li>`).join('')}</ul><div class="section-title">HELD ITEM STRATEGY</div>${p.heldItem?`<div style="padding:12px 16px;background:var(--bg-card);border:1px solid ${p.heldItem.obtained?'var(--green)':'var(--border)'};border-radius:8px;display:flex;align-items:flex-start;gap:12px;margin-bottom:8px"><div style="font-size:20px">${p.heldItem.obtained?'✅':'📦'}</div><div><div style="font-weight:700;font-size:13px;color:${p.heldItem.obtained?'var(--green)':'var(--amber)'}">Suggested: ${p.heldItem.name} <span style="font-size:10px;font-weight:400;color:var(--text-muted)">${p.heldItem.obtained?'OBTAINED':'NOT YET'}</span></div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">${p.heldItem.effect}</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">How to get: ${p.heldItem.loc}</div></div></div>`:''}\
${p.battleBerry?`<div style="padding:12px 16px;background:rgba(76,175,80,0.06);border:1px solid rgba(76,175,80,0.2);border-radius:8px;display:flex;align-items:flex-start;gap:12px;margin-bottom:8px"><div style="font-size:20px">🫐</div><div><div style="font-weight:700;font-size:13px;color:var(--green)">E4 Berry: ${p.battleBerry.name}</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">${p.battleBerry.why}</div></div></div>`:''}\
<div style="padding:12px 16px;background:rgba(255,171,0,0.06);border:1px solid rgba(255,171,0,0.2);border-radius:8px;display:flex;align-items:flex-start;gap:12px"><div style="font-size:20px">💰</div><div><div style="font-weight:700;font-size:13px;color:var(--amber)">Grinding: Amulet Coin</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">Give Amulet Coin to whoever leads trainer battles for double prize money. During E4, give Amulet Coin to GLACIER.DB (fights in 5/7 battles) for max payout.</div></div></div>\
${p.gen3?`<div class="section-title">GEN 3 MECHANICS</div><div class="mechanics-card"><p>${p.gen3}</p></div>`:''}<div class="section-title">E4 ASSIGNMENTS</div><div style="font-size:13px;line-height:1.8;color:var(--text-dim)">${getE4(p.name)}</div>`}
